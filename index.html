<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusRide</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F5F2EB; color: #0D0F14; overflow-x: hidden; }
    h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; outline: none; font-family: 'DM Sans', sans-serif; }
    input, select, textarea { font-family: 'DM Sans', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px);} to { opacity:1; transform:translateY(0);} }
    @keyframes pulse { 0%,100% { transform:scale(1);} 50% { transform:scale(1.04);} }
    @keyframes marquee { from { transform:translateX(0);} to { transform:translateX(-50%);} }
    .fade-up { animation: fadeUp 0.6s ease both; }
    .fade-up-1 { animation: fadeUp 0.6s 0.1s ease both; }
    .fade-up-2 { animation: fadeUp 0.6s 0.2s ease both; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F5F2EB; }
    ::-webkit-scrollbar-thumb { background: #F4A800; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

// ─── DESIGN TOKENS ───────────────────────────────────────────────
const C = {
  ink: "#0D0F14",
  paper: "#F5F2EB",
  amber: "#F4A800",
  amberLight: "#FFD166",
  teal: "#0A7E6E",
  tealLight: "#12B89F",
  rust: "#C94C2E",
  muted: "#6B6B6B",
  card: "#FFFFFF",
  border: "#E2DDD4",
  success: "#1A9E6A",
};

const fonts = `
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
`;

const globalCSS = `
${fonts}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: ${C.paper}; color: ${C.ink}; overflow-x: hidden; }
h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; outline: none; font-family: 'DM Sans', sans-serif; }
input, select, textarea { font-family: 'DM Sans', sans-serif; }

@keyframes fadeUp { from { opacity:0; transform:translateY(24px);} to { opacity:1; transform:translateY(0);} }
@keyframes slideIn { from { opacity:0; transform:translateX(-20px);} to { opacity:1; transform:translateX(0);} }
@keyframes pulse { 0%,100% { transform:scale(1);} 50% { transform:scale(1.04);} }
@keyframes spin { from { transform:rotate(0deg);} to { transform:rotate(360deg);} }
@keyframes marquee { from { transform:translateX(0);} to { transform:translateX(-50%);} }
@keyframes shimmer { 0% { background-position:-200% 0;} 100% { background-position:200% 0;} }

.fade-up { animation: fadeUp 0.6s ease both; }
.fade-up-1 { animation: fadeUp 0.6s 0.1s ease both; }
.fade-up-2 { animation: fadeUp 0.6s 0.2s ease both; }
.fade-up-3 { animation: fadeUp 0.6s 0.3s ease both; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: ${C.paper}; }
::-webkit-scrollbar-thumb { background: ${C.amber}; border-radius: 3px; }
`;

// ─── ICONS ───────────────────────────────────────────────────────
const Icon = ({ name, size = 20, color = "currentColor" }) => {
  const icons = {
    bus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M6 18v2M18 18v2M2 10h20"/><circle cx="7" cy="14" r="1" fill={color}/><circle cx="17" cy="14" r="1" fill={color}/></svg>,
    map: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>,
    card: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
    shield: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
    clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M4.93 4.93l1.41 1.41M21 12h-2M5 12H3M12 21v-2M12 5V3"/></svg>,
    logout: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    home: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    dollar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
    chart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
    menu: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
    x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    star: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke={color} strokeWidth="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    phone: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 10.73 19.79 19.79 0 0 1 1.61 2.18 2 2 0 0 1 3.59 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 7.91a16 16 0 0 0 6.08 6.08l.88-.88a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
    mail: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
    scan: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 7 4"/><polyline points="20 7 20 4 17 4"/><polyline points="4 17 4 20 7 20"/><polyline points="20 17 20 20 17 20"/><line x1="7" y1="12" x2="17" y2="12"/></svg>,
    download: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    users: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
    truck: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    eye: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  };
  return icons[name] || null;
};

// ─── SHARED COMPONENTS ───────────────────────────────────────────
const Btn = ({ children, variant = "primary", onClick, style = {}, size = "md" }) => {
  const base = {
    display: "inline-flex", alignItems: "center", gap: 8, fontFamily: "'Syne', sans-serif",
    fontWeight: 700, borderRadius: 6, transition: "all 0.2s", border: "2px solid transparent",
    fontSize: size === "sm" ? 13 : size === "lg" ? 17 : 15,
    padding: size === "sm" ? "8px 16px" : size === "lg" ? "16px 32px" : "11px 22px",
  };
  const variants = {
    primary: { background: C.amber, color: C.ink, border: `2px solid ${C.amber}` },
    secondary: { background: "transparent", color: C.ink, border: `2px solid ${C.ink}` },
    teal: { background: C.teal, color: "#fff", border: `2px solid ${C.teal}` },
    ghost: { background: "transparent", color: C.muted, border: `2px solid ${C.border}` },
    danger: { background: C.rust, color: "#fff", border: `2px solid ${C.rust}` },
  };
  return (
    <button onClick={onClick} style={{ ...base, ...variants[variant], ...style }}
      onMouseEnter={e => { e.currentTarget.style.opacity = "0.85"; e.currentTarget.style.transform = "translateY(-1px)"; }}
      onMouseLeave={e => { e.currentTarget.style.opacity = "1"; e.currentTarget.style.transform = "translateY(0)"; }}>
      {children}
    </button>
  );
};

const Badge = ({ children, color = C.amber }) => (
  <span style={{ background: color + "22", color: color, border: `1px solid ${color}44`, borderRadius: 4, padding: "3px 10px", fontSize: 12, fontWeight: 600, fontFamily: "'Syne',sans-serif" }}>
    {children}
  </span>
);

const Card = ({ children, style = {} }) => (
  <div style={{ background: C.card, borderRadius: 12, border: `1px solid ${C.border}`, padding: 24, ...style }}>
    {children}
  </div>
);

const Input = ({ label, type = "text", value, onChange, placeholder, style = {} }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 6, ...style }}>
    {label && <label style={{ fontSize: 13, fontWeight: 500, color: C.muted }}>{label}</label>}
    <input type={type} value={value} onChange={onChange} placeholder={placeholder}
      style={{ padding: "11px 14px", borderRadius: 8, border: `1.5px solid ${C.border}`, fontSize: 14, background: C.paper, color: C.ink, outline: "none", transition: "border-color 0.2s" }}
      onFocus={e => e.target.style.borderColor = C.amber}
      onBlur={e => e.target.style.borderColor = C.border} />
  </div>
);

// ─── NAV ─────────────────────────────────────────────────────────
const Nav = ({ page, setPage, user, setUser }) => {
  const [open, setOpen] = useState(false);
  const links = ["Home", "About", "Routes", "Pricing"];
  return (
    <nav style={{ position: "sticky", top: 0, zIndex: 100, background: C.ink, color: "#fff", padding: "0 5vw", display: "flex", alignItems: "center", justifyContent: "space-between", height: 64, borderBottom: `3px solid ${C.amber}` }}>
      <style>{globalCSS}</style>
      <div onClick={() => setPage("Home")} style={{ cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ background: C.amber, borderRadius: 8, padding: "6px 10px", display: "flex" }}>
          <Icon name="bus" size={20} color={C.ink} />
        </div>
        <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 20, letterSpacing: "-0.5px" }}>Campus<span style={{ color: C.amber }}>Ride</span></span>
      </div>

      {/* Desktop */}
      <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
        {links.map(l => (
          <button key={l} onClick={() => setPage(l)}
            style={{ background: "none", color: page === l ? C.amber : "#ccc", fontFamily: "'Syne',sans-serif", fontWeight: 600, fontSize: 14, padding: "8px 14px", borderRadius: 6, transition: "color 0.2s", border: "none" }}>
            {l}
          </button>
        ))}
        {user ? (
          <div style={{ display: "flex", gap: 8, marginLeft: 8 }}>
            <Btn size="sm" variant="ghost" onClick={() => setPage(user.role === "admin" ? "Admin" : user.role === "driver" ? "Driver" : "Dashboard")}
              style={{ color: "#fff", borderColor: "#ffffff44" }}>
              <Icon name="user" size={14} /> {user.name.split(" ")[0]}
            </Btn>
            <Btn size="sm" variant="danger" onClick={() => { setUser(null); setPage("Home"); }}>
              <Icon name="logout" size={14} />
            </Btn>
          </div>
        ) : (
          <div style={{ display: "flex", gap: 8, marginLeft: 8 }}>
            <Btn size="sm" variant="ghost" onClick={() => setPage("Login")} style={{ color: "#fff", borderColor: "#ffffff44" }}>Login</Btn>
            <Btn size="sm" onClick={() => setPage("Register")}>Register</Btn>
          </div>
        )}
      </div>
    </nav>
  );
};

// ─── HOME PAGE ────────────────────────────────────────────────────
const HomePage = ({ setPage }) => {
  const steps = [
    { icon: "user", title: "1. Register", desc: "Sign up with your student ID and university email." },
    { icon: "card", title: "2. Get Your Card", desc: "Receive your CampusRide card within 24 hours." },
    { icon: "dollar", title: "3. Load Balance", desc: "Top up via mobile money, card, or online." },
    { icon: "scan", title: "4. Scan & Ride", desc: "Scan your card at the bus stop and go!" },
  ];
  const features = [
    { icon: "shield", title: "Safe Rides", desc: "GPS-tracked buses, verified drivers, 24/7 support." },
    { icon: "clock", title: "On-Time Always", desc: "Fixed timetables, real-time delay notifications." },
    { icon: "map", title: "Fixed Routes", desc: "Dedicated campus routes, no detours." },
    { icon: "card", title: "Cashless System", desc: "Prepaid card — no cash needed ever." },
    { icon: "bus", title: "Student-Only", desc: "Buses reserved for verified university students." },
    { icon: "dollar", title: "Affordable Fares", desc: "Starting from just $1 per ride, weekly passes available." },
  ];
  const unis = ["Painesville Uni", "Broadville College", "Baton Rougeville State", "City Tech"];
  const testimonials = [
    { name: "Amara K.", uni: "Painesville Uni", text: "CampusRide changed my mornings. No more taxi drama!", stars: 5 },
    { name: "Carlos M.", uni: "Broadville College", text: "The cashless system is genius. I just tap and ride.", stars: 5 },
    { name: "Fatima O.", uni: "Baton Rougeville State", text: "Finally, a transport system that respects students!", stars: 5 },
  ];

  return (
    <div>
      {/* HERO */}
      <section style={{ background: C.ink, color: "#fff", padding: "100px 5vw 80px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -80, right: -80, width: 400, height: 400, background: C.amber + "15", borderRadius: "50%", filter: "blur(80px)" }} />
        <div style={{ position: "absolute", bottom: -60, left: "30%", width: 300, height: 300, background: C.teal + "20", borderRadius: "50%", filter: "blur(60px)" }} />
        <div style={{ maxWidth: 700, position: "relative", zIndex: 1 }} className="fade-up">
          <Badge color={C.amber}>🚌 Now serving 3 cities</Badge>
          <h1 style={{ fontSize: "clamp(42px,6vw,80px)", fontWeight: 800, lineHeight: 1.05, margin: "20px 0 24px", letterSpacing: "-2px" }}>
            Smart Transport<br /><span style={{ color: C.amber }}>for University</span><br />Students
          </h1>
          <p style={{ fontSize: 18, color: "#aaa", lineHeight: 1.7, maxWidth: 500, marginBottom: 36 }}>
            No more taxi struggles. CampusRide is a dedicated, cashless bus system built exclusively for university students.
          </p>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <Btn size="lg" onClick={() => setPage("Register")}><Icon name="user" size={18} />Register Free</Btn>
            <Btn size="lg" variant="secondary" onClick={() => setPage("Routes")}
              style={{ color: "#fff", borderColor: "#ffffff44" }}><Icon name="map" size={18} />Find Your Route</Btn>
          </div>
        </div>

        {/* Animated bus card */}
        <div className="fade-up-2" style={{ position: "absolute", right: "8vw", top: "50%", transform: "translateY(-50%)", background: "#1a1c22", border: `2px solid ${C.amber}33`, borderRadius: 20, padding: 28, width: 280, display: "none" }}>
          <div style={{ color: C.amber, fontFamily: "'Syne',sans-serif", fontWeight: 700, marginBottom: 12 }}>🚌 Live: Route 7A</div>
          <div style={{ fontSize: 13, color: "#888" }}>Painesville → Campus Gate</div>
          <div style={{ marginTop: 16, padding: "10px 14px", background: C.amber + "15", borderRadius: 8, display: "flex", justifyContent: "space-between" }}>
            <span style={{ color: "#aaa", fontSize: 13 }}>Next bus</span>
            <span style={{ color: C.amber, fontWeight: 700 }}>4 min</span>
          </div>
        </div>
      </section>

      {/* MARQUEE UNIS */}
      <div style={{ background: C.amber, padding: "12px 0", overflow: "hidden", whiteSpace: "nowrap" }}>
        <div style={{ display: "inline-block", animation: "marquee 12s linear infinite" }}>
          {[...unis, ...unis].map((u, i) => (
            <span key={i} style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 14, margin: "0 32px", color: C.ink }}>
              🎓 {u}
            </span>
          ))}
        </div>
      </div>

      {/* HOW IT WORKS */}
      <section style={{ padding: "80px 5vw", background: C.paper }}>
        <div style={{ textAlign: "center", marginBottom: 56 }}>
          <Badge>How It Works</Badge>
          <h2 style={{ fontSize: 40, fontWeight: 800, margin: "16px 0 12px", letterSpacing: "-1px" }}>Ride in 4 Simple Steps</h2>
          <p style={{ color: C.muted, fontSize: 16 }}>Getting started takes less than 5 minutes.</p>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: 24 }}>
          {steps.map((s, i) => (
            <Card key={i} style={{ textAlign: "center", position: "relative" }}>
              <div style={{ background: C.ink, borderRadius: 12, width: 52, height: 52, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
                <Icon name={s.icon} size={22} color={C.amber} />
              </div>
              <h3 style={{ fontWeight: 700, fontSize: 17, marginBottom: 8 }}>{s.title}</h3>
              <p style={{ color: C.muted, fontSize: 14, lineHeight: 1.6 }}>{s.desc}</p>
              {i < 3 && <div style={{ position: "absolute", right: -12, top: "50%", fontSize: 20, color: C.amber, fontWeight: 900, zIndex: 2 }}>→</div>}
            </Card>
          ))}
        </div>
      </section>

      {/* FEATURES */}
      <section style={{ padding: "80px 5vw", background: "#F0ECE3" }}>
        <div style={{ textAlign: "center", marginBottom: 56 }}>
          <Badge color={C.teal}>Why CampusRide</Badge>
          <h2 style={{ fontSize: 40, fontWeight: 800, margin: "16px 0 12px", letterSpacing: "-1px" }}>Built for Student Life</h2>
        </div>

// ─── DRIVER PANEL ─────────────────────────────────────────────────
const DriverPage = ({ user }) => {

  const students = [

    { name: "Maria G.", stop: "Student Hub", boarded: true },
    { name: "Kofi A.", stop: "Main Library", boarded: false },
    { name: "Sarah C.", stop: "Science Park", boarded: false },

  return (
    <div style={{ display: "flex", minHeight: "calc(100vh - 64px)" }}>
      <div style={{ width: 210, background: "#1a1c22", color: "#fff", padding: 20, display: "flex", flexDirection: "column", gap: 4 }}>
        <div style={{ padding: "12px 14px", marginBottom: 16 }}>
          <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 16, color: C.teal }}>Driver Panel</div>
          <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>{user?.name || "Driver"}</div>
        </div>
        {[["route", "map", "My Route"], ["students", "users", "Student List"], ["report", "alert", "Report Delay"], ["emergency", "phone", "Emergency"]].map(([n, ic, l]) => (
          <button key={n} onClick={() => setTab(n)}
            style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 8, background: tab === n ? C.teal : "transparent", color: tab === n ? "#fff" : "#888", width: "100%", fontFamily: "'Syne',sans-serif", fontWeight: 600, fontSize: 14, cursor: "pointer", border: "none" }}>
            <Icon name={ic} size={16} color={tab === n ? "#fff" : "#888"} /> {l}
          </button>
        ))}
      </div>

      <div style={{ flex: 1, padding: 32, background: "#F8F5EE" }}>
        {tab === "route" && (
          <div>
            <h2 style={{ fontSize: 28, fontWeight: 800, marginBottom: 24 }}>Your Route Today</h2>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
              <Card style={{ background: C.ink, color: "#fff" }}>
                <div style={{ color: C.teal, fontSize: 13, marginBottom: 8 }}>Assigned Route</div>
                <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 22, color: C.amber }}>Route 7A</div>
                <div style={{ color: "#888", fontSize: 13, marginTop: 4 }}>Painesville Campus · 12 stops</div>
              </Card>
              <Card>
                <div style={{ color: C.muted, fontSize: 13, marginBottom: 8 }}>Status</div>
                <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 22, color: C.success }}>On Route</div>
                <div style={{ color: C.muted, fontSize: 13, marginTop: 4 }}>Bus: BUS-014</div>
              </Card>
            </div>
            <Card>
              <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, marginBottom: 16 }}>Next Stops</div>
              {["Main Library", "Science Park", "Medical Campus", "Sports Complex"].map((s, i) => (
                <div key={s} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
                  <div style={{ background: i === 0 ? C.amber : C.border, borderRadius: "50%", width: 10, height: 10, flexShrink: 0 }} />
                  <span style={{ fontSize: 14, fontWeight: i === 0 ? 600 : 400 }}>{s}</span>
                  {i === 0 && <Badge color={C.amber}>Next</Badge>}
                </div>
              ))}
            </Card>
          </div>
        )}
        {tab === "students" && (
          <div>
            <h2 style={{ fontSize: 28, fontWeight: 800, marginBottom: 24 }}>Student List — Route 7A</h2>
            <Card>
              {students.map((s, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 0", borderBottom: i < students.length - 1 ? `1px solid ${C.border}` : "none" }}>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{s.name}</div>
                    <div style={{ fontSize: 12, color: C.muted }}>{s.stop}</div>
                  </div>
                  <Badge color={s.boarded ? C.success : C.muted}>{s.boarded ? "✓ Boarded" : "Awaiting"}</Badge>
                </div>
              ))}
            </Card>
          </div>
        )}
        {tab === "report" && (
          <div style={{ maxWidth: 480 }}>
            <h2 style={{ fontSize: 28, fontWeight: 800, marginBottom: 24 }}>Report Delay</h2>
            <Card>
              {delayed ? (
                <div style={{ textAlign: "center", padding: 20 }}>
                  <div style={{ fontSize: 48 }}>📡</div>

                  <Input label="Delay duration (minutes)" placeholder="e.g. 15" />
                  <Input label="Reason" placeholder="e.g. Traffic on Main St" />
                  <Btn variant="teal" onClick={() => setDelayed(true)}>
                    <Icon name="alert" size={16} />Send Delay Alert to Students
                  </Btn>
                </div>
              )}
            </Card>
          </div>
        )}
        {tab === "emergency" && (
          <div style={{ maxWidth: 480 }}>
            <h2 style={{ fontSize: 28, fontWeight: 800, marginBottom: 24 }}>Emergency Contact</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {[
                { label: "CampusRide Dispatch", number: "+1 (555) 000-0001", icon: "phone", color: C.teal },
                { label: "Police Emergency", number: "911", icon: "phone", color: C.rust },
                { label: "Medical Emergency", number: "112", icon: "phone", color: C.amber },
              ].map(c => (
                <Card key={c.label} style={{ display: "flex", alignItems: "center", gap: 16 }}>
                  <div style={{ background: c.color + "15", borderRadius: 10, padding: 12 }}>
                    <Icon name={c.icon} size={22} color={c.color} />

                  <div>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700 }}>{c.label}</div>
                    <div style={{ color: c.color, fontWeight: 700, marginTop: 4 }}>{c.number}</div>
                  </div>
                </Card>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── APP ROOT ─────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("Home");
  const [user, setUser] = useState(null);

  const render = () => {
    switch (page) {
      case "Home": return <HomePage setPage={setPage} />;
      case "About": return <AboutPage />;
      case "Routes": return <RoutesPage />;
      case "Pricing": return <PricingPage setPage={setPage} />;
      case "Register": return <RegisterPage setUser={setUser} setPage={setPage} />;
      case "Login": return <LoginPage setUser={setUser} setPage={setPage} />;
      case "Dashboard": return user ? <DashboardPage user={user} setUser={setUser} /> : <LoginPage setUser={setUser} setPage={setPage} />;
      case "Admin": return user ? <AdminPage /> : <LoginPage setUser={setUser} setPage={setPage} />;
      case "Driver": return user ? <DriverPage user={user} /> : <LoginPage setUser={setUser} setPage={setPage} />;
      default: return <HomePage setPage={setPage} />;
    }
  };

  return (
    <div>
      <style>{globalCSS}</style>
      <Nav page={page} setPage={setPage} user={user} setUser={setUser} />
      {render()}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
